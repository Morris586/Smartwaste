{% extends "base.html" %}
{% block content %}

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card card-smartwaste p-4 p-md-5">
                <p class="text-muted text-center mb-2" style="font-size: 0.9rem;">We're here to help</p>
                <h2 class="text-center mb-2 section-title">Request a Pickup</h2>
                <p class="text-center text-muted mb-4">Fill in the details below and we'll schedule your waste collection. It only takes a moment.</p>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label">Your name</label>
                        {{ form.name }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Phone number</label>
                        {{ form.phone }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Pickup address</label>
                        {{ form.address }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Waste type</label>
                        {{ form.waste_type }}
                    </div>

                    <button class="btn btn-cta w-100 py-3" type="submit">Submit Request</button>
                </form>

                <a href="{% url 'home' %}" class="btn btn-outline-eco mt-3 w-100">Back to Home</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
