{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Request Waste Pickup</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Name</label>
                {{ form.name }}
            </div>

            <div class="mb-3">
                <label class="form-label">Phone</label>
                {{ form.phone }}
            </div>

            <div class="mb-3">
                <label class="form-label">Address</label>
                {{ form.address }}
            </div>

            <div class="mb-3">
                <label class="form-label">Waste Type</label>
                {{ form.waste_type }}
            </div>

            <button class="btn btn-success w-100" type="submit">Submit Request</button>
        </form>

        <a href="{% url 'home' %}" class="btn btn-secondary mt-3 w-100">Back to Home</a>
    </div>
</div>



{% endblock %}
